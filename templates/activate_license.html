<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate License — Vortex Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#060810;color:#e2e8f0;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.07) 1px,transparent 1px);background-size:40px 40px;z-index:0}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.15) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;pointer-events:none}
.card{position:relative;z-index:1;width:100%;max-width:480px;background:rgba(15,18,32,.85);border:1px solid rgba(99,102,241,.25);border-radius:20px;padding:2.5rem;box-shadow:0 40px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(20px)}
.logo{text-align:center;margin-bottom:2rem}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:1rem;box-shadow:0 0 30px rgba(99,102,241,.4)}
h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#a5b4fc,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
.subtitle{font-size:.85rem;color:#64748b;letter-spacing:.05em}
.steps{display:flex;gap:.5rem;margin-bottom:2rem;position:relative}
.step{flex:1;text-align:center}
.step-num{width:28px;height:28px;border-radius:50%;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;font-family:'Space Mono',monospace;color:#6366f1;margin-bottom:.3rem}
.step.active .step-num{background:#6366f1;border-color:#6366f1;color:#fff;box-shadow:0 0 12px rgba(99,102,241,.5)}
.step-label{font-size:.7rem;color:#475569}
.step-line{position:absolute;top:14px;left:calc(50%/3 + 14px);right:calc(50%/3 + 14px);height:1px;background:rgba(99,102,241,.2);z-index:-1}
.field{margin-bottom:1.2rem}
label{display:block;font-size:.78rem;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.75rem 1rem;color:#e2e8f0;font-family:'Space Mono',monospace;font-size:.9rem;transition:all .2s;outline:none}
input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
input::placeholder{color:#334155;font-family:'Sora',sans-serif}
.page{display:none}.page.active{display:block}
.btn{width:100%;padding:.85rem;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Sora',sans-serif;letter-spacing:.03em}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(99,102,241,.5)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:#fca5a5;margin-bottom:1rem;display:none}
.err.show{display:block}
.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:#86efac;margin-bottom:1rem;display:none}
.ok.show{display:block}
.key-hint{font-size:.75rem;color:#475569;margin-top:.5rem;font-family:'Space Mono',monospace}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:rgba(255,255,255,.07);margin:1.5rem 0}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Vortex Panel</h1>
    <p class="subtitle">LICENSE ACTIVATION</p>
  </div>

  <div class="steps">
    <div class="step active" id="s1"><div class="step-num">1</div><div class="step-label">License Key</div></div>
    <div class="step" id="s2"><div class="step-num">2</div><div class="step-label">Owner Setup</div></div>
    <div class="step" id="s3"><div class="step-num">3</div><div class="step-label">Done</div></div>
    <div class="step-line"></div>
  </div>

  <!-- Step 1: License Key -->
  <div class="page active" id="page1">
    <div class="err" id="err1"></div>
    <div class="field">
      <label>License Key</label>
      <input type="text" id="licKey" placeholder="vortex_Xxxxxxxxx_xxxxxxxx" autocomplete="off" spellcheck="false">
      <p class="key-hint">Format: vortex_Xxxxxxxxx_xxxxxxxx</p>
    </div>
    <button class="btn btn-primary" id="verifyBtn" onclick="verifyKey()">Verify License Key</button>
  </div>

  <!-- Step 2: Owner credentials -->
  <div class="page" id="page2">
    <div class="err" id="err2"></div>
    <p style="font-size:.82rem;color:#64748b;margin-bottom:1.2rem">Set your owner (super admin) account. You'll use these to log in.</p>
    <div class="field">
      <label>Owner Username</label>
      <input type="text" id="ownerUser" placeholder="admin" autocomplete="off">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="ownerEmail" placeholder="admin@yourdomain.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="ownerPass" placeholder="Min 8 characters">
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="ownerPass2" placeholder="Repeat password">
    </div>
    <button class="btn btn-primary" id="activateBtn" onclick="activate()">Activate Panel</button>
  </div>

  <!-- Step 3: Success -->
  <div class="page" id="page3">
    <div style="text-align:center;padding:1rem 0">
      <div style="font-size:3rem;margin-bottom:1rem">✅</div>
      <h2 style="color:#86efac;margin-bottom:.5rem">Panel Activated!</h2>
      <p style="color:#64748b;font-size:.85rem;margin-bottom:2rem">Redirecting to login…</p>
    </div>
  </div>
</div>

<script>
let validatedKey = '';

function setStep(n) {
  for(let i=1;i<=3;i++){
    document.getElementById('s'+i).classList.toggle('active', i<=n);
    const p = document.getElementById('page'+i);
    if(p) p.classList.toggle('active', i===n);
  }
}

async function verifyKey() {
  const key = document.getElementById('licKey').value.trim().toUpperCase();
  const err = document.getElementById('err1');
  const btn = document.getElementById('verifyBtn');
  err.classList.remove('show');
  if(!key){err.textContent='Please enter a license key.';err.classList.add('show');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Verifying…';
  // Simple format check client-side (real check happens on activation)
  if(!/^VRTX-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(key)){
    // also allow any non-empty key for flexibility
  }
  validatedKey = key;
  btn.disabled=false;
  btn.innerHTML='Verify License Key';
  setStep(2);
}

async function activate() {
  const u = document.getElementById('ownerUser').value.trim();
  const e = document.getElementById('ownerEmail').value.trim();
  const p = document.getElementById('ownerPass').value;
  const p2 = document.getElementById('ownerPass2').value;
  const err = document.getElementById('err2');
  const btn = document.getElementById('activateBtn');
  err.classList.remove('show');
  if(!u||!e||!p){err.textContent='All fields are required.';err.classList.add('show');return;}
  if(p.length < 8){err.textContent='Password must be at least 8 characters.';err.classList.add('show');return;}
  if(p !== p2){err.textContent='Passwords do not match.';err.classList.add('show');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Activating…';
  try {
    const res = await fetch('/activate-license', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        license_key: validatedKey,
        owner_username: u,
        owner_email: e,
        owner_password: p
      })
    });
    const data = await res.json();
    if(data.success){
      setStep(3);
      setTimeout(()=>{ window.location.href='/login'; }, 2500);
    } else {
      err.textContent = data.error || 'Activation failed.';
      err.classList.add('show');
      btn.disabled=false;
      btn.innerHTML='Activate Panel';
    }
  } catch(ex) {
    err.textContent='Network error: '+ex.message;
    err.classList.add('show');
    btn.disabled=false;
    btn.innerHTML='Activate Panel';
  }
}

document.getElementById('licKey').addEventListener('keypress', e => { if(e.key==='Enter') verifyKey(); });
document.addEventListener('keypress', e => {
  if(e.key==='Enter' && document.getElementById('page2').classList.contains('active')) activate();
});
</script>
</body>
</html>
